        let history = [];

        // Функция для поиска ошибки в базе
        function findError(query) {
            const upperQuery = query.toUpperCase().trim();
            
            // Прямое совпадение с кодом ошибки
            if (errorsDB[upperQuery]) {
                return {
                    found: true,
                    code: upperQuery,
                    description: errorsDB[upperQuery]
                };
            }
            
            // Поиск по частичному совпадению
            for (const [code, description] of Object.entries(errorsDB)) {
                if (code.includes(upperQuery) || upperQuery.includes(code)) {
                    return {
                        found: true,
                        code: code,
                        description: description
                    };
                }
            }
            
            return { found: false };
        }
        
        // Конвертация Markdown в HTML
        function renderMarkdown(text) {
            if (!text) return '';
            
            let html = text;
            
            // Изображения (должны обрабатываться первыми)
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
                return `<img src="content/images/${src}" alt="${alt}" loading="lazy" onclick="showImageModal(this.src)"><div class="image-caption">${alt}</div>`;
            });
            
            // Ссылки
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, url) => {
                if (url.startsWith('newNode_')) {
                    return `<a href="#" onclick="goToNode('${url}'); return false;">${text}</a>`;
                } else {
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`;
                }
            });
            
            // Жирный текст
            html = html.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            
            // Курсив
            html = html.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            
            // Код
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Заголовки
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // Маркированные списки
            html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`);
            
            // Нумерованные списки
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ol>${match}</ol>`);
            
            // Цитаты
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // Горизонтальные линии
            html = html.replace(/^---+$/gm, '<hr>');
            
            // Переносы строк в параграфы
            const paragraphs = html.split('\n\n');
            html = paragraphs.map(p => {
                if (p.trim() && !p.startsWith('<') && !p.includes('<h') && !p.includes('<ul') && !p.includes('<ol') && !p.includes('<blockquote') && !p.includes('<hr')) {
                    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
                }
                return p;
            }).join('');
            
            return html;
        }
        
        // Функция для показа изображения в модальном окне
        function showImageModal(src) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                cursor: pointer;
            `;
            const img = document.createElement('img');
            img.src = src;
            img.style.cssText = `
                max-width: 90%;
                max-height: 90%;
                border-radius: 8px;
            `;
            modal.appendChild(img);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }
        
        // Переход к узлу
        function goToNode(nodeId) {
            if (!nodes[nodeId]) {
                alert('Страница не найдена');
                return;
            }
            
            // Добавляем в историю
            if (history.length === 0 || history[history.length-1] !== nodeId) {
                history.push(nodeId);
            }
            
            currentNode = nodeId;
            const node = nodes[nodeId];
            
            // Рендерим контент
            const title = node.title || nodeId;
            const text = node.text || 'Нет описания для этой страницы.';
            
            let html = `<div class="title">${title}</div>`;
            html += `<div class="text">${renderMarkdown(text)}</div>`;
            
            // Добавляем разделитель перед кнопками
            if (node.buttons && node.buttons.length > 0) {
                html += '<div class="separator"></div>';
                node.buttons.forEach(btn => {
                    const btnText = btn.text || '';
                    if (btn.target) {
                        html += `<button class="button" onclick="goToNode('${btn.target}')">📂 ${btnText}</button>`;
                    } else if (btn.url) {
                        html += `<button class="button external" onclick="window.open('${btn.url}', '_blank')">🔗 ${btnText}</button>`;
                    }
                });
            }
            
            document.getElementById('content').innerHTML = html;
            
            // Прокрутка вверх
            window.scrollTo(0, 0);
        }
        
        // Домой
        function goHome() {
            history = [];
            goToNode('newNode_12');
        }
        
        // Назад
        function goBack() {
            if (history.length > 1) {
                history.pop();
                goToNode(history[history.length-1]);
            } else {
                goHome();
            }
        }
        
        // Поиск (с поддержкой базы ошибок)
        let searchTimeout;
        
        function performSearch(query) {
            if (!query) return false;
            
            // Сначала ищем в базе ошибок
            const errorResult = findError(query);
            
            if (errorResult.found) {
                // Показываем результат из базы ошибок
                let html = `<div class="title">🔍 Код ошибки: ${errorResult.code}</div>`;
                html += `<div class="error-card">`;
                html += `<div class="error-code">${errorResult.code}</div>`;
                html += `<div class="error-description">${errorResult.description.replace(/\n/g, '<br>')}</div>`;
                html += `</div>`;
                html += `<div class="search-hint">💡 Вы можете также поискать в разделах программы:</div>`;
                
                // Добавляем кнопки для перехода в связанные разделы
                const relatedSections = [];
                const codePrefix = errorResult.code.charAt(0);
                
                if (codePrefix === 'Е' || codePrefix === 'E') {
                    relatedSections.push({target: 'newNode_2', text: '📖 САУТ - Неисправности и советы'});
                } else if (codePrefix === 'Н') {
                    relatedSections.push({target: 'newNode_3', text: '📖 КПД - Параметры и настройка'});
                } else if (codePrefix === 'К') {
                    relatedSections.push({target: 'newNode_4', text: '📖 КЛУБ-У / БЛОК - Команды'});
                }
                
                relatedSections.forEach(section => {
                    html += `<button class="button" onclick="goToNode('${section.target}')">${section.text}</button>`;
                });
                
                html += `<div class="separator"></div>`;
                html += `<button class="button" onclick="goHome()">🏠 Вернуться на главную</button>`;
                
                document.getElementById('content').innerHTML = html;
                return true;
            }
            
            return false;
        }
        
        function search() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = document.getElementById('search').value.trim();
                
                if (!query) {
                    // Если поиск пустой, показываем последний узел
                    if (currentNode) {
                        goToNode(currentNode);
                    } else {
                        goHome();
                    }
                    return;
                }
                
                // Сначала пробуем найти в базе ошибок
                if (performSearch(query)) {
                    return;
                }
                
                // Если не нашли в базе ошибок, ищем в узлах
                const results = [];
                const lowerQuery = query.toLowerCase();
                
                for (const [id, node] of Object.entries(nodes)) {
                    const searchText = (node.title + ' ' + node.text).toLowerCase();
                    if (searchText.includes(lowerQuery)) {
                        results.push({id, title: node.title});
                    }
                }
                
                if (results.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="title">🔍 Результаты поиска</div>
                        <div class="text" style="text-align: center; padding: 40px;">
                            <p>По запросу «<strong>${query}</strong>» ничего не найдено</p>
                            <p style="color: #666; margin-top: 20px;">Попробуйте:</p>
                            <ul style="text-align: left; display: inline-block;">
                                <li>Проверить правильность написания кода ошибки</li>
                                <li>Использовать форматы: <strong>Н600</strong>, <strong>К71</strong>, <strong>Е1001</strong></li>
                                <li>Поискать по ключевым словам в разделах</li>
                            </ul>
                        </div>
                        <button class="button" onclick="goHome()">🏠 Вернуться на главную</button>
                    `;
                    return;
                }
                
                // Показываем результаты поиска по узлам
                let resultsHtml = `<div class="title">🔍 Результаты поиска: ${results.length}</div>`;
                resultsHtml += `<div class="text">Найдено страниц: <strong>${results.length}</strong></div>`;
                resultsHtml += '<div class="separator"></div>';
                
                results.slice(0, 50).forEach(result => {
                    let title = result.title;
                    if (title.length > 80) title = title.substring(0, 80) + '...';
                    resultsHtml += `<button class="button" onclick="goToNode('${result.id}')">📄 ${title}</button>`;
                });
                
                document.getElementById('content').innerHTML = resultsHtml;
            }, 300);
        }
        
        // Сохраняем данные для офлайн-режима
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('Service Worker registered');
            }).catch(error => {
                console.log('Service Worker failed:', error);
            });
        }
        
        // Запуск приложения
        goHome();
        
        // Обработчик поиска
        document.getElementById('search').addEventListener('input', search);
        
        // Предотвращаем случайное закрытие при свайпе
        let touchStart = 0;
        document.addEventListener('touchstart', (e) => {
            touchStart = e.touches[0].clientX;
        });
    </script>
