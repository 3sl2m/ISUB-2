        // Конвертация Markdown в HTML
        function renderMarkdown(text) {
            if (!text) return '';
            
            let html = text;
            
            // Изображения (должны обрабатываться первыми)
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
                return `<img src="content/images/${src}" alt="${alt}" loading="lazy" onclick="showImageModal(this.src)">`;
            });
            
            // Ссылки
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, url) => {
                if (url.startsWith('newNode_')) {
                    return `<a href="#" onclick="goToNode('${url}'); return false;">${text}</a>`;
                } else {
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`;
                }
            });
            
            // Жирный текст
            html = html.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            
            // Курсив
            html = html.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            
            // Код
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Заголовки
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // Маркированные списки
            html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            
            // Нумерованные списки
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            // Цитаты
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // Горизонтальные линии
            html = html.replace(/^---+$/gm, '<hr>');
            
            // Переносы строк в параграфы
            const paragraphs = html.split('\n\n');
            html = paragraphs.map(p => {
                if (p.trim() && !p.startsWith('<') && !p.includes('<h') && !p.includes('<ul') && !p.includes('<blockquote')) {
                    return `<p>${p}</p>`;
                }
                return p;
            }).join('');
            
            return html;
        }
        
        // Функция для показа изображения в модальном окне
        function showImageModal(src) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                cursor: pointer;
            `;
            const img = document.createElement('img');
            img.src = src;
            img.style.cssText = `
                max-width: 90%;
                max-height: 90%;
                border-radius: 8px;
            `;
            modal.appendChild(img);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }
        
        // Переход к узлу
        function goToNode(nodeId) {
            if (!nodes[nodeId]) {
                alert('Страница не найдена');
                return;
            }
            
            // Добавляем в историю
            if (history.length === 0 || history[history.length-1] !== nodeId) {
                history.push(nodeId);
            }
            
            currentNode = nodeId;
            const node = nodes[nodeId];
            
            // Рендерим контент
            const title = node.title || nodeId;
            const text = node.text || 'Нет описания для этой страницы.';
            
            let html = `<div class="title">${title}</div>`;
            html += `<div class="text">${renderMarkdown(text)}</div>`;
            
            // Добавляем кнопки из JSON
            if (node.buttons && node.buttons.length > 0) {
                html += '<hr style="margin: 16px 0;">';
                node.buttons.forEach(btn => {
                    const btnText = btn.text || '';
                    if (btn.target) {
                        html += `<button class="button" onclick="goToNode('${btn.target}')">${btnText}</button>`;
                    } else if (btn.url) {
                        html += `<button class="button external" onclick="window.open('${btn.url}', '_blank')">🔗 ${btnText}</button>`;
                    }
                });
            }
            
            document.getElementById('content').innerHTML = html;
            
            // Рендерим меню
            let menuHtml = '<div class="menu-title">📑 Быстрая навигация</div>';
            if (node.buttons) {
                node.buttons.forEach(btn => {
                    if (btn.target) {
                        menuHtml += `<div class="menu-item" onclick="goToNode('${btn.target}')">${btn.text}</div>`;
                    } else if (btn.url) {
                        menuHtml += `<div class="menu-item" style="color:#1f8a70" onclick="window.open('${btn.url}', '_blank')">🔗 ${btn.text}</div>`;
                    }
                });
            }
            
            document.getElementById('menu').innerHTML = menuHtml;
            
            // Прокрутка вверх
            window.scrollTo(0, 0);
        }
        
        // Домой
        function goHome() {
            history = [];
            goToNode('newNode_12');
        }
        
        // Назад
        function goBack() {
            if (history.length > 1) {
                history.pop();
                goToNode(history[history.length-1]);
            } else {
                goHome();
            }
        }
        
        // Поиск
        let searchTimeout;
        function search() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = document.getElementById('search').value.toLowerCase().trim();
                if (!query) {
                    // Если поиск пустой, показываем обычное меню текущего узла
                    if (currentNode) {
                        const node = nodes[currentNode];
                        let menuHtml = '<div class="menu-title">📑 Быстрая навигация</div>';
                        if (node.buttons) {
                            node.buttons.forEach(btn => {
                                if (btn.target) {
                                    menuHtml += `<div class="menu-item" onclick="goToNode('${btn.target}')">${btn.text}</div>`;
                                } else if (btn.url) {
                                    menuHtml += `<div class="menu-item" style="color:#1f8a70" onclick="window.open('${btn.url}', '_blank')">🔗 ${btn.text}</div>`;
                                }
                            });
                        }
                        document.getElementById('menu').innerHTML = menuHtml;
                    }
                    return;
                }
                
                // Ищем результаты
                const results = [];
                for (const [id, node] of Object.entries(nodes)) {
                    const searchText = (node.title + ' ' + node.text).toLowerCase();
                    if (searchText.includes(query)) {
                        results.push({id, title: node.title});
                    }
                }
                
                if (results.length === 0) {
                    document.getElementById('menu').innerHTML = '<div class="menu-title">🔍 Ничего не найдено</div>';
                    return;
                }
                
                // Показываем результаты
                let menuHtml = `<div class="menu-title">🔍 Результаты: ${results.length}</div>`;
                results.slice(0, 30).forEach(result => {
                    let title = result.title;
                    if (title.length > 80) title = title.substring(0, 80) + '...';
                    menuHtml += `<div class="menu-item" onclick="goToNode('${result.id}')">${title}</div>`;
                });
                
                document.getElementById('menu').innerHTML = menuHtml;
            }, 300);
        }
        
        // Сохраняем данные для офлайн-режима
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('Service Worker registered');
            }).catch(error => {
                console.log('Service Worker failed:', error);
            });
        }
        
        // Запуск приложения
        goHome();
        
        // Обработчик поиска
        document.getElementById('search').addEventListener('input', search);
        
        // Предотвращаем случайное закрытие при свайпе
        let touchStart = 0;
        document.addEventListener('touchstart', (e) => {
            touchStart = e.touches[0].clientX;
        });
    </script>
</body>
