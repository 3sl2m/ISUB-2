g"], "buttons": [{"text": "РЭ на сайте Нейроком", "url": "https://www.neurocom.ru/products/ukb/blok/"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_16": {"id": "newNode_16", "title": "ЭПК-150", "text": "![параметры эпк](параметры эпк.png)![пружины](пружины.png)", "images": ["параметры эпк.png", "пружины.png"], "buttons": [{"text": "Главная", "target": "newNode_12"}]}, "newNode_17": {"id": "newNode_17", "title": "Приемные катушки", "text": "![парметры ПК](парметры ПК.jpg)![плакат-эдс](плакат-эдс.jpg)![плакат-температура](плакат-температура.jpg)", "images": ["плакат-температура.jpg", "плакат-эдс.jpg", "парметры ПК.jpg"], "buttons": [{"text": "Видео ПРР приемных катушек", "url": "https://youtu.be/91znPRc-e_k?si=GWM9vLTKs5wgqoKV"}, {"text": "Видео Катушки приемные", "url": "https://www.youtube.com/watch?v=XdPHXlwhYAs"}, {"text": "Видео Прием кодов", "url": "https://www.youtube.com/watch?v=Tovmei75WYY"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_2": {"id": "newNode_2", "title": "САУТ", "text": "## САУТ — Неисправности и советы\n\n**1) При V=0 (после снижения скорости на пульте при включенном тумблере на ПУ режим САУТ), срабатывает ТМ и соответственно нет схемы.** \n\n Путем подмены всех блоков выяснили, что виноват БЭК.\n\n **2) Не держит ЭПК при вкл САУТ, или в режиме Саут:** \n\n **1.** С БПРу - блок БЭК Конфиг именно для грузового поезда, не ЧС и т.п. только ВЛ10, ВЛ11.\n\n **2.** Неисправен БС-ЦКР.\n\n **3)Не притягивается ЭЭ САУТ на скоростемере в режиме САУТ:** \n\n **1.** БПРу - блок БЭК ЗАПИСАТЬ конфиг именно для грузового поезда, не ЧС и т.п. только ВЛ10, ВЛ11.\n\n **2.** Проверить соответствие схемы фишки подключения 1-2 или 3-6 (наши по идее подписаны на корпусе скоростемера),\n\n **3.** Проверить контролькой + и – на фишке саут , контакты 1,2 или 3,6 при включенном тумблере режима САУТ\n\n **4) Не показывает скорость САУТ** \n : Датчики, БС ДПС или БЭК(на КПД есть скорость)\n\n **5) Моргает индикация на пульт ПМ.** \n\n Выключи Тягу при 0 КМ, это нормально при включении САУТ. \n\n ** 6) ПУ режимы САУТ (зеленый / красный, режим САУТ и ПОДСКАЗКИ)** \n  Тумблер в АЛС отключает отключает цепи локомотива от САУТ. Используется для КРАТКОВРЕМЕННОГО отключения САУТ при сбоях и для дальнейшего анализа оных. При этом, САУТ не теряет информацию полученную из базы САУТ.\n\n ** 7) Идет проверка бдительности в режиме САУТ под КЖ, Вылезла ошибка Е1001**  \n – замена бс-алс помогло, При проверке блокировка обязательна, так как через минуту идет свисток эпк, не реагируя на рб.\n\n ** 8) Через минуту Пропадает индикация включения режима САУТ на ПМ, на тумблер включения АЛС/САУТ не реагирует.** \n   Помогла замена БЭК\n\n ** 9) При включении САУТ на ПУ, в режим «САУТ» выбивает АЗВ АЛСН.**  \n Выявлен неисправный БЭК.\n\n ** 10) В пути следования погас пу саут, свист эпк, пропала тяга.**  \n Помогла замена Бэк", "images": [], "buttons": [{"text": "Неисправности и коды ошибок", "url": "https://telegra.ph/Kody-oshibok-SAUT-07-21"}, {"text": "Работа САУТ", "url": "https://telegra.ph/SAUT-CM485-07-21"}, {"text": "БПрУ", "url": "https://telegra.ph/BPrU-07-21"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_3": {"id": "newNode_3", "title": "КПД — Параметры и настройка", "text": "КПД  Введите в поиске номер ошибки (Н600)\n\n\nПоложение крана на 15 прошивке:\nЧ+МИН в обслуге и 27 параметр 1\n\n## Режим обслуживания\nНа ПС ( панели соединительной) переключить тумблер из \"Р\" в  \"О\".\n\nВключить. На цифровом индикаторе появится общий пробег.\n\nТ-пролистывает параметры\nКОНТР-увеличивает показания на 100\nЧ-увеличивает показания на 10\n## Параметры:\n\n\n**00** Давление ТМ\n\n\n**1** Давление ТЦ\n\n\n**02** Диаметр бандажа 1кп ( 600-1350)\n\n\n**03** Диаметр бандажа 2кп ( 600-1350)\n\n\n**04** Наличие МПМЭ (кассеты)\n\n\n**05** ТИП ЛОКОМОТИВА (все внизу страницы)\n      ВЛ10у-138; ВЛ11-134; ВЛ11м-153; ТЭМ14-627; ТЭМ7а-509; ТЭМ7-547; ЧМЭ3-557; ТЭМ18ДМ-607\n\n\n**06** Номер локомотива\n\n\n**07**    42 - количество зубьев\n\n\n**08** Верхний предел шкалы скорости\n\n\n**09** Дискретность регистр пути БР-2М/1\n\n\n**10** Дискретность регистр скорости БР2М/1\n\n\n**11** Наличия БР/2М/1  (0 или 1)\n\n\n**12** Верхний предел измерения давления 10\n\n\n**13** Наличие \nблока контроля:  0 для 3ПА; 1 для 3ПВ\n\n\n**14** Скорость V(Ж)\n\n\n**15** Скорость V(КЖ)\n\n\n**16**  (Ноль нельзя)    1\n\n\n**17** Признак одной или двух кабин  1; 2 (2 при 1 КПД на 2 ДКСВМ); 3-МВПС\n\n\n**18** Вариант АЛС:  \n0-АЛС; 1-АЛС+Л143; 2-УКБМ; 5-Л132+Л143; 8-АЛС+ТСКБМ; 16-САУТ; 24-САУТ+ТСКБМ; 32-АЛС4; 64-АЛС+Л116\n\n\n**19** БУС: 0-нет или 1-да\n\n\n**20** АГС Путь на один импульс (15-255)\n\n\n**21** Код варианта КВАРТА\n ![](кварта.png) \n\n\n**22** Дискретность регистрации топлива (10-255)\n\n\n**23** День и месяц\n\n\n**24** Год\n\n\n**25** Число доп параметров 0-4\n\n\n**26**  Чисел в табельном номере  8\n\n\n**27** 1-при наличии ККМ или СИПТМ;  0-при отсутствии \n\n\n**После ввода параметров нажать на БУ-3ПВ кнопку П.**\n\nПосле записи параметров в РПЗУ на цифровом и дополнительном индикаторах должно индицироваться значение общего пробега.\n\n При некорректно заданном параметре на цифровом индикаторе скорости высвечивается его номер, а на дополнительном – значение текущего параметра. В этом случае необходимо повторить установку значения данного параметра. \n\nВыключить питание. Перевести переключатель на панели соединительной ПС-3П из положения \"О\" в положение \"Р\".\n\n Закрыть окно обслуживания.\n---\n\n ![](тип локо 1.png) ![](тип локо 2.png) ![](тип локо 3.png)", "images": ["тип локо 2.png", "кварта.png", "тип локо 3.png", "тип локо 1.png"], "buttons": [{"text": "Коды ошибок КПД", "target": "newNode_6"}, {"text": "Настройка КПД 3ПС", "target": "newNode_5"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_4": {"id": "newNode_4", "title": "КЛУБ-У / БЛОК К71", "text": "![к5](к5.jpg)КЛУБ-У БЛОК К71\n\nК5 Ввод постоянных характеристик (с кассетой и БВДУ для КЛУБ)\nК71 диагностика исправностик\nК70 выход из диагностики![к71](к71.png)\n![к71](к71.jpg)К263  Отмена контроля скатывания в течение 120 сек\nК522 версия карты![снс.png](снс.png)", "images": ["к71.jpg", "снс.png", "к71.png", "к5.jpg"], "buttons": [{"text": "Команды БЛОК", "url": "https://telegra.ph/Perchen-komand-BLOK-07-21"}, {"text": "Команды КЛУБ-У", "url": "https://telegra.ph/Komandy-KLUB-U-09-13"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_5": {"id": "newNode_5", "title": "Настройка параметров КПД 3ПС", "text": "КПД  Введите в поиске номер ошибки (Н600)\n\n## Режим обслуживания\nНастройка условно постоянных признаков производится согласно ЦАКТ 468332.014 РЭ\n\nНа  блоке коммутации снять крышку ОБСЛУЖИВАНИЕ и приключить тумблер из положения **Р** в **О**.\n\nПосле включения нажать **ВВОД**.\n\nДля изменения параметров использовать цифровые кнопки.\n## Параметры:\n\n\n1   **Д1** Диаметр бандажа первой колесной пары 600-1350\n\n2   **Д2** Диаметр бандажа второй колесной пары 600-1350\n\n3  **МПМЭ** наличие 0 или 1\n\n4  **Шлюз** наличие  0 или 1\n\n5  **Глонасс** наличие функции   0 или 1\n\n6  **Тип локомотива**   согласно прил Б РЭ внизу страницы\n\n7  **НОМЕР** локомотива   0001-9999\n\n8  **ДУП** число зубьев    42\n\n9  **ШКАЛА** предел     75; 100; 150\n\n10  **V ж**    скорость под Желтый\n\n11  **V кж** скорость под КЖ\n\n12  **V-УПР**  не используется\n\n13 **КАБИНА** признак одной, двух или МВПС\n\n                         **1** - одна; **2** - две; **3** - МВПС\n\n14  **Код варианта АЛС**\n ![](КПД алс.jpg) \n\n 15  **БУС**   наличие   0 или 1\n\n16  **ПЛОТНость** \n\n                 **0**-нет датчика уровня\n\n                 **1** - есть датчик уровня\n\n                 **2**-есть датчик уровня и плотности\n\n17  **ДИСКРЕТность**  регистрации топлива 10-255\n\n18  **БАКИ**  число баков 1-4\n\n19 **ДАТА**\n\n20 **ГОД**\n\n21 **ВЕРСИЯ**\n\n22 **IP АДР1** 1й разряд  ххх.000.000.000\n\n23 **IP АДР2** 2й разряд  000.ххх.000.000\n\n24 **IP АДР3** 3й разряд  000.000.ххх.000\n\n25 **IP АДР4** 4й разряд  000.000.000.ххх\n\n26 **ПОРТ** номер для ТСР\n\n**Сохранить изменения.**\n\n\n**После ввода параметров нажать на БУ-3ПВ кнопку П.**\n\nПосле записи параметров в РПЗУ на цифровом и дополнительном индикаторах должно индицироваться значение общего пробега.\n\n\n При некорректно заданном параметре на цифровом индикаторе скорости высвечивается его номер, а на дополнительном – значение текущего параметра. В этом случае необходимо повторить установку значения данного параметра. \n\n\nВыключить питание. Перевести переключатель на панели соединительной ПС-3П из положения \"О\" в положение \"Р\".\n\n\n Закрыть окно обслуживания.\n---\n\n ![](тип локо 1.png) ![](тип локо 2.png) ![](тип локо 3.png)", "images": ["тип локо 2.png", "тип локо 3.png", "тип локо 1.png", "КПД алс.jpg"], "buttons": [{"text": "Коды ошибок КПД", "target": "newNode_6"}, {"text": "Настройка КПД 3ПА и ЗПВ", "target": "newNode_3"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_6": {"id": "newNode_6", "title": "Настройка параметров КПД 3ПС", "text": "КПД  Введите в поиске номер ошибки (Н600)\n\n ![](кпд1.jpg) ![](кпд2.jpg) ![](кпд3.jpg) ![](кпд4.jpg)", "images": ["кпд2.jpg", "кпд3.jpg", "кпд4.jpg", "кпд1.jpg"], "buttons": [{"text": "Настройка КПД 3ПС", "target": "newNode_5"}, {"text": "Настройка КПД 3ПА и ЗПВ", "target": "newNode_3"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_7": {"id": "newNode_7", "title": "ИСАВП-РТ 2ЭС6 — Методика проверки", "text": "![](ИСАВП-РТ_экран.png)\n\n## Методика проверки ИСАВП-РТ на электровозе 2ЭС6\n\n**Подготовка:** Токоприёмник поднят, БВ, компрессоры и вентиляторы включены, тормоза заряжены, БЛОК (БЛОК-М) и ключ ЭПК включены. Включено независимое возбуждение, реверсор в положении «вперёд» в проверяемой кабине. Во второй кабине включить БЛОК (БЛОК-М). В обеих секциях включить модемы ВЭБР и поездную радиостанцию.\n\n\n **Управление меню:**\n- `ВВОД (ENTER)` – подтверждение, переход на уровень ниже.\n- `ОТМ (CLEAR)` – отмена, возврат на уровень выше.\n- `↓` и `↑` – навигация.\n- `+` и `-` + цифры – быстрый доступ к пунктам.\n\n### Основные проверки:\n\n1. **Установка носителя:** \nВставить СН в держатель. \nНа мониторе БЛОК должен появиться значок о↓о. \nНа главном экране МПСУиД должна быть подпись клавиши «7» «СИМ».\n Нажать «7» для входа в систему ИСАВП-РТ.\n\n 2. **Выбор режима:** \nПосле заставки нажать `ВВОД`.\n Выбрать режим: в проверяемой кабине – «Ведущий», во второй – «Ведомый». \n Задать начальные параметры, выбрать любой маршрут в обеих кабинах. \n Дождаться загрузки маршрута из БД САУТ. \n Убедиться в отсутствии сообщения «вставьте картридж!».\n\n 3. **Проверка датчиков АЛСН и давления:**\n   - На главном экране ввести `63` → `ОТМ` для входа в «Главное меню».\n\n   - `Диагностика` → `Датчики` → `АЛСН`: проверить сигналы (на шлейфе) или просто белый огонь.\n\n   - `Диагностика` → `Датчики` → `ДАВЛЕНИЕ`: убедиться, что показания датчиков (УР, ТМ, ТЦ, ПМ) отличаются от манометров и БЛОК не более чем на 0,02 МПа (0,2 бар). \n\n Ручка крана машиниста во II положении, ручка вспомогательного тормоза в крайнем тормозном.\n\n 4. **Проверка торможения кнопочным контроллером:**\n\n   - Перевести ручку крана машиниста в I положение. Давление ТМ должно расти быстрее УР.\n\n   - В «Главном меню» выбрать `Кнопочный контроллер` или нажать `+` + `3`.\n\n Установить джойстик «ТЯГА» в `+1`, нажать `ВВОД`. \n\n Провести цикл: `1-9` (торможение до нужного давления) → `0` (переключение на отпуск) → `1-9` (отпуск до нужного давления). \n\n При достижении заданных давлений система автоматически переходит в «перекрышу» или «поездное» положение.\n\n 5. **Проверка маневрового режима и автоведения:**\n\n   - В «Главном меню» → `Настройка` → нажать `3` для включения маневрового.\n\n При включенном маневровом переход в автоведение невозможен.\n\n   - Включить автоведение: последовательно нажать `+` и `-` и перевести джойстик «ТЯГА» в `+1`. \n\n После появления позиции и токов сбросить тягу кнопкой «выбег» — режим автоведения должен отключиться.\n\n 6. **Проверка связи и КАЭТ:**\n\n   - Войти в расширенный режим (`63` → `ОТМ`). \n\n Перейти в `Диагностика` → `Датчики` → `ИНФО`.\n\n   - При удержании кнопки «Торможение соединённого поезда до остановки» >1 секунды должно появиться «ЭКСТОРМ : да» и выполниться ступень торможения.\n\n   - При нажатии КАЭТ должно появляться «КАЭТ : да» и надпись «Торможение до остановки».\n\n   - Проверить радиоканал:\n\n `Главное меню` → `Настройки` → `САВПРТ`. В `Диагностика связи` → `Стат осн.канала ведущего` значения «Принято» и «Передано» должны отличаться не более чем на 1 на 100. \n\n В `Качество связи` нажать `1` — КСВ должен быть 1,0-1,5.\n\n   - Для проверки дополнительного канала\n\n в `Настройка` → `Савпрт` → `Проверка д.канала` нажать `1`. \n\n Проверить статистику, затем снова нажать `1` для отключения.\n\n   - Для проверки БХВ:\n\n выбрать режим «поезд с БХВ СУТП».\n\n В `Настройка` → `Настройка БХВ` задать любой несуществующий номер БХВ (>5000). \n\n В `Диагностика` → `БХВ` → `Состояние МОСТа` первая строка должна быть «Работает», КСВ 1,0-1,5.\n\n 7. **Завершение:** \n\n После проверок секции 1 перевести управление в секцию 2 и повторить все пункты. \n\n Затем считать СН-БЛОК на ноутбуке через УСК БЛОК для сохранения файлов поездок.", "images": ["ИСАВП-РТ_экран.png"], "buttons": [{"text": "Видео для машинистов: Настройка автоведения ИСАВП-РТ", "url": "https://youtu.be/LhIyJjA28s8?si=u1RwQOfbPLNgH6Ri"}, {"text": "Видиео АВП Технолигия :Структура системы ИСАВП- РТ- М", "url": "https://youtu.be/uOkZ8u7QeeY?si=qu4YRB33muWNiNhJ"}, {"text": "Ютуб по запросу ИСАВП-РТ", "url": "https://www.youtube.com/results?search_query=ИСАВП-РТ+2ЭС6"}, {"text": "Главная", "target": "newNode_12"}]}, "newNode_8": {"id": "newNode_8", "title": "Устройства безопасности", "text": "ОЯ, УКБМ, КОН, АГС...\n\nИдет периодичность в 0, залипли контакты кнопки КП.![Мини-блокнот](Мини-блокнот.jpg) ![Ламели в ОЯ](Ламели в ОЯ.jpg)", "images": ["Мини-бл         function findError(query) {
            const upperQuery = query.toUpperCase().trim();
            
            if (errorsDB[upperQuery]) {
                return {
                    found: true,
                    code: upperQuery,
                    description: errorsDB[upperQuery]
                };
            }
            
            for (const [code, description] of Object.entries(errorsDB)) {
                if (code.includes(upperQuery) || upperQuery.includes(code)) {
                    return {
                        found: true,
                        code: code,
                        description: description
                    };
                }
            }
            
            return { found: false };
        }
        
        function renderMarkdown(text) {
            if (!text) return '';
            
            let html = text;
            
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
                return `<img src="content/images/${src}" alt="${alt}" loading="lazy" onclick="showImageModal(this.src)"><div class="image-caption">${alt}</div>`;
            });
            
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, url) => {
                if (url.startsWith('newNode_')) {
                    return `<a href="#" onclick="goToNode('${url}'); return false;">${text}</a>`;
                } else {
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`;
                }
            });
            
            html = html.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            html = html.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`);
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ol>${match}</ol>`);
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^---+$/gm, '<hr>');
            
            const paragraphs = html.split('\n\n');
            html = paragraphs.map(p => {
                if (p.trim() && !p.startsWith('<') && !p.includes('<h') && !p.includes('<ul') && !p.includes('<ol') && !p.includes('<blockquote') && !p.includes('<hr')) {
                    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
                }
                return p;
            }).join('');
            
            return html;
        }
        
        function showImageModal(src) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                cursor: pointer;
            `;
            const img = document.createElement('img');
            img.src = src;
            img.style.cssText = `
                max-width: 90%;
                max-height: 90%;
                border-radius: 8px;
            `;
            modal.appendChild(img);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }
        
        function renderButtons(buttons) {
            if (!buttons || buttons.length === 0) return '';
            
            let html = '<div class="buttons-section">';
            html += '<div class="buttons-grid">';
            
            // Сохраняем исходный порядок кнопок из nodes.json
            buttons.forEach(btn => {
                const btnText = btn.text || '';
                if (btn.target) {
                    html += `
                        <button class="button internal" onclick="goToNode('${btn.target}')">
                            <span class="button-icon">📄</span>
                            <span class="button-text button-text-wrap">${escapeHtml(btnText)}</span>
                        </button>
                    `;
                } else if (btn.url) {
                    html += `
                        <button class="button external" onclick="window.open('${btn.url}', '_blank')">
                            <span class="button-icon">🔗</span>
                            <span class="button-text button-text-wrap">${escapeHtml(btnText)}</span>
                        </button>
                    `;
                }
            });
            
            html += '</div>';
            html += '</div>';
            return html;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function goToNode(nodeId) {
            if (!nodes[nodeId]) {
                alert('Страница не найдена');
                return;
            }
            
            if (history.length === 0 || history[history.length-1] !== nodeId) {
                history.push(nodeId);
            }
            
            currentNode = nodeId;
            const node = nodes[nodeId];
            
            const title = node.title || nodeId;
            const text = node.text || 'Нет описания для этой страницы.';
            
            let html = `<div class="title">${escapeHtml(title)}</div>`;
            html += `<div class="text">${renderMarkdown(text)}</div>`;
            
            if (node.buttons && node.buttons.length > 0) {
                html += '<div class="separator"></div>';
                html += renderButtons(node.buttons);
            }
            
            document.getElementById('content').innerHTML = html;
            window.scrollTo(0, 0);
        }
        
        function goHome() {
            history = [];
            goToNode('newNode_12');
        }
        
        function goBack() {
            if (history.length > 1) {
                history.pop();
                goToNode(history[history.length-1]);
            } else {
                goHome();
            }
        }
        
        let searchTimeout;
        
        function performSearch(query) {
            if (!query) return false;
            
            const errorResult = findError(query);
            
            if (errorResult.found) {
                let html = `<div class="title">🔍 Код ошибки: ${errorResult.code}</div>`;
                html += `<div class="error-card">`;
                html += `<div class="error-code">${errorResult.code}</div>`;
                html += `<div class="error-description">${errorResult.description.replace(/\n/g, '<br>')}</div>`;
                html += `</div>`;
                html += `<div class="search-hint">💡 Вы можете также поискать в разделах программы:</div>`;
                
                const relatedSections = [];
                const codePrefix = errorResult.code.charAt(0);
                
                if (codePrefix === 'Е' || codePrefix === 'E') {
                    relatedSections.push({target: 'newNode_2', text: '📖 САУТ - Неисправности и советы'});
                } else if (codePrefix === 'Н') {
                    relatedSections.push({target: 'newNode_3', text: '📖 КПД - Параметры и настройка'});
                } else if (codePrefix === 'К') {
                    relatedSections.push({target: 'newNode_4', text: '📖 КЛУБ-У / БЛОК - Команды'});
                }
                
                if (relatedSections.length > 0) {
                    html += '<div class="buttons-grid">';
                    relatedSections.forEach(section => {
                        html += `
                            <button class="button internal" onclick="goToNode('${section.target}')">
                                <span class="button-icon">📖</span>
                                <span class="button-text">${section.text}</span>
                            </button>
                        `;
                    });
                    html += '</div>';
                }
                
                html += `<div class="separator"></div>`;
                html += `<button class="button-full" onclick="goHome()">🏠 Вернуться на главную</button>`;
                
                document.getElementById('content').innerHTML = html;
                return true;
            }
            
            return false;
        }
        
        function search() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = document.getElementById('search').value.trim();
                
                if (!query) {
                    if (currentNode) {
                        goToNode(currentNode);
                    } else {
                        goHome();
                    }
                    return;
                }
                
                if (performSearch(query)) {
                    return;
                }
                
                const results = [];
                const lowerQuery = query.toLowerCase();
                
                for (const [id, node] of Object.entries(nodes)) {
                    const searchText = (node.title + ' ' + node.text).toLowerCase();
                    if (searchText.includes(lowerQuery)) {
                        results.push({id, title: node.title});
                    }
                }
                
                if (results.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="title">🔍 Результаты поиска</div>
                        <div class="text" style="text-align: center; padding: 40px;">
                            <p>По запросу «<strong>${escapeHtml(query)}</strong>» ничего не найдено</p>
                            <p style="color: #666; margin-top: 20px;">Попробуйте:</p>
                            <ul style="text-align: left; display: inline-block;">
                                <li>Проверить правильность написания кода ошибки</li>
                                <li>Использовать форматы: <strong>Н600</strong>, <strong>К71</strong>, <strong>Е1001</strong></li>
                                <li>Поискать по ключевым словам в разделах</li>
                            </ul>
                        </div>
                        <button class="button-full" onclick="goHome()">🏠 Вернуться на главную</button>
                    `;
                    return;
                }
                
                let resultsHtml = `<div class="title">🔍 Результаты поиска: ${results.length}</div>`;
                resultsHtml += `<div class="text">Найдено страниц: <strong>${results.length}</strong></div>`;
                resultsHtml += '<div class="separator"></div>';
                
                results.slice(0, 50).forEach(result => {
                    let title = result.title;
                    if (title.length > 80) title = title.substring(0, 80) + '...';
                    resultsHtml += `
                        <button class="button-full" onclick="goToNode('${result.id}')">
                            <span>📄</span>
                            <span>${escapeHtml(title)}</span>
                        </button>
                    `;
                });
                
                document.getElementById('content').innerHTML = resultsHtml;
            }, 300);
        }
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('Service Worker registered');
            }).catch(error => {
                console.log('Service Worker failed:', error);
            });
        }
        
        goHome();
        
        document.getElementById('search').addEventListener('input', search);
        
        let touchStart = 0;
        document.addEventListener('touchstart', (e) => {
            touchStart = e.touches[0].clientX;
        });
    </script>
</body>
</html>
